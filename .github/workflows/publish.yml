name: Publish to GitHub Packages

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            version:
                description: "Optional version override (defaults to build.gradle)"
                required: false
                type: string

jobs:
    publish:
        name: Publish shadow JAR to GitHub Packages
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - uses: actions/checkout@v6

            - name: Set up JDK 21
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: "21"

            - name: Set up Gradle
              uses: gradle/actions/setup-gradle@v6

            - name: Resolve publish version
              id: version
              run: |
                  if [ -n "${{ inputs.version }}" ]; then
                    echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
                  elif [ "${{ github.event_name }}" = "release" ]; then
                    # Strip an optional leading "v" from the tag (v1.2.3 -> 1.2.3).
                    tag="${{ github.event.release.tag_name }}"
                    echo "value=${tag#v}" >> "$GITHUB_OUTPUT"
                  else
                    echo "value=" >> "$GITHUB_OUTPUT"
                  fi

            - name: Publish
              env:
                  GITHUB_ACTOR: ${{ github.actor }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  args="publish --no-daemon --stacktrace"
                  if [ -n "${{ steps.version.outputs.value }}" ]; then
                    args="$args -Pversion=${{ steps.version.outputs.value }}"
                  fi
                  ./gradlew $args
