# ModernVillagerShop configuration

locale: ja_JP
fallbackLocale: en_US

storage:
  type: sqlite # sqlite | mysql
  sqlite:
    file: shops.db
  mysql:
    host: localhost
    port: 3306
    database: vshop
    username: root
    password: ""
    properties: "useUnicode=true&characterEncoding=utf8&useSSL=false"
    poolSize: 8

economy:
  feeRate: 0.05
  # 管理者ショップの手数料率。未指定なら feeRate と同じ値を使う
  feeRateAdmin: 0.05
  priceMin: 1
  priceMax: 1000000
  amountMax: 2304
  fractionDigits: 2
  roundingMode: HALF_UP
  priceDriftTolerance: 0.01
  currencyFormat: "<amount> <currency>"
  priceProvider:
    enabled: true

shop:
  maxShopsPerPlayer: -1 # -1 = unlimited
  openDistance: 6.0
  minDistance: 0.5
  defaultLimitScope: PER_PLAYER # PER_PLAYER | GLOBAL
  villagerNameFormat: "<shop_name> <gray>[<primary>]</gray>"
  # 管理者ショップ用のVillager名フォーマット（所有者名がないため別形式）
  villagerNameFormatAdmin: "<shop_name>"
  # 在庫を持ったままの店を閉じるときの挙動
  #   DISCARD = 在庫を破棄して削除
  #   DROP    = 在庫を店の位置にドロップして削除
  #   REFUSE  = 在庫がある間は削除を拒否
  closeWithInventory: REFUSE

playerCache:
  maxEntries: 5000
  defaultSort: LAST_SEEN_DESC # LAST_SEEN_DESC | NAME_ASC
  textureTtl: 7d

items:
  blacklist:
    - SHULKER_BOX
    - WHITE_SHULKER_BOX
    - ORANGE_SHULKER_BOX
    - MAGENTA_SHULKER_BOX
    - LIGHT_BLUE_SHULKER_BOX
    - YELLOW_SHULKER_BOX
    - LIME_SHULKER_BOX
    - PINK_SHULKER_BOX
    - GRAY_SHULKER_BOX
    - LIGHT_GRAY_SHULKER_BOX
    - CYAN_SHULKER_BOX
    - PURPLE_SHULKER_BOX
    - BLUE_SHULKER_BOX
    - BROWN_SHULKER_BOX
    - GREEN_SHULKER_BOX
    - RED_SHULKER_BOX
    - BLACK_SHULKER_BOX
    - BUNDLE

placeholderapi:
  enabled: true

# プレイヤー本人にだけ聞こえる効果音。
# key はマイクラのサウンドID（例: minecraft:ui.button.click）。
# key を空文字にすればそのイベントは無音になる。
# category は MASTER | PLAYERS | AMBIENT | BLOCKS | HOSTILE | NEUTRAL | RECORDS | MUSIC | VOICE | UI から選ぶ。
sounds:
  ui:
    # 村人ショップを右クリックして操作画面を開いた瞬間（顧客ビュー / オーナーメニュー共通）
    open:
      key: "minecraft:ui.button.click"
      volume: 1.0
      pitch: 1.0
      category: MASTER
  trade:
    success:
      # SELL 成功時（プレイヤーがショップに売った）
      sell:
        key: "minecraft:entity.villager.yes"
        volume: 1.0
        pitch: 1.0
        category: MASTER
      # BUY 成功時（オーダーへ納品した）
      buy:
        key: "minecraft:entity.villager.yes"
        volume: 1.0
        pitch: 1.0
        category: MASTER
    # 取引失敗時（在庫切れ・所持金不足・上限超過など）
    failure:
      key: "minecraft:entity.villager.no"
      volume: 1.0
      pitch: 1.0
      category: MASTER

ui:
  chest:
    icons:
      nextPage:
        material: ARROW
        name: "<white>次のページ"
      prevPage:
        material: ARROW
        name: "<white>前のページ"
      close:
        material: BARRIER
        name: "<red>閉じる"
      sort:
        material: COMPARATOR
        name: "<white>並び替え"
      filter:
        material: HOPPER
        name: "<white>絞り込み"
      back:
        material: OAK_DOOR
        name: "<white>戻る"
      unknownPlayer:
        material: PLAYER_HEAD
        name: "<gray>(不明)"
      unavailable:
        material: BARRIER
        name: "<red>利用不可"
      emptySlot:
        material: GRAY_STAINED_GLASS_PANE
        name: " "
