    title: "<white>購入確認"
    body: "<gray><item> を <amount> 個 (<packs> パック)\n単価 <unit_price> / 合計 <price>\n手数料 <fee>"
    yes: "購入する"
    no: "やめる"
  confirm-buy:
    title: "<white>納品確認"
