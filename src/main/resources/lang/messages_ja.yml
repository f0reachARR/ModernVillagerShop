# MiniMessage messages (Japanese)
command:
  help:
    header: "<gold>=== ModernVillagerShop ヘルプ ==="
    line: "<yellow>/vshop <gray>- <white><desc>"
  unknown: "<red>不明なサブコマンドです。/vshop help を参照してください。"
  no-permission: "<red>権限がありません。"
  player-only: "<red>このコマンドはプレイヤーのみ実行できます。"
  shop-not-found: "<red>指定されたショップが見つかりません: <shop_id>"
  egg:
    issued: "<green>スポーンエッグを <player> に配布しました。"
    not-found: "<red>対象プレイヤーが見つかりません: <player>"
  reload:
    done: "<green>設定をリロードしました。"
  migrate:
    started: "<yellow>マイグレーションを開始しました: <from> -> <to>"
    done: "<green>マイグレーション完了。"
    failed: "<red>マイグレーション失敗: <reason>"

shop:
  created: "<green>ショップ <shop_id> を作成しました。"
  deleted: "<green>ショップ <shop_id> を削除しました。"
  suspended: "<yellow>ショップ <shop_id> を一時停止しました。"
  resumed: "<green>ショップ <shop_id> の公開を再開しました。"
  egg:
    name: "<aqua>ショップスポーンエッグ <gray>(<type>)"
    lore-lines: "<gray>行数: <lines>"
    lore-admin: "<gray>管理者ショップ用"
  villager:
    default-name: "ショップ"
  place:
    too-close: "<red>近くにショップがあるため設置できません。"
    too-many: "<red>所有ショップ数の上限に達しています。"
    placed: "<green>ショップを設置しました。"
    failed: "<red>ショップの設置に失敗しました。"
  open:
    suspended: "<yellow>このショップは一時停止中です。"
    too-far: "<red>このショップに近づいてください。"
  edit:
    no-permission: "<red>このショップを編集する権限がありません。"
    editing: "<yellow>編集モード中: <shop_name>"
    busy: "<red>このショップは編集中です。少し待ってから再度お試しください。"

trade:
  sold: "<green>購入しました: <item> x<amount> = <price> <gray>(手数料 <fee>)"
  bought: "<green>納品しました: <item> x<amount> = <price> <gray>(手数料 <fee>)"
  out-of-stock: "<red>在庫が不足しています。"
  buy-full: "<red>受入枠が満杯です。"
  not-enough-money-buyer: "<red>所持金が足りません。"
  not-enough-money-owner: "<red>店主の残高が不足しているため取引できません。"
  limit-reached: "<red>取引上限に達しています。"
  price-drift: "<red>価格が変動したため取引をキャンセルしました。再度開いてください。"
  amount-prompt:
    title: "<white>数量入力"
    body: "<gray><item> を取引する数量 (パック数) を入力してください。"
    submit: "次へ"
    label: "パック数 (1パック=<unit>個)"
  confirm-sell:
    title: "<white>購入確認"
    body: "<gray><item> を <amount> 個 (<packs> パック)\n単価 <unit_price> / 合計 <price>\n手数料 <fee>"
    yes: "購入する"
    no: "やめる"
  confirm-buy:
    title: "<white>納品確認"
    body: "<gray><item> を <amount> 個 (<packs> パック) 納品\n買取単価 <unit_price> / 受取額 <payout>\n手数料 <fee>"
    yes: "納品する"
    no: "やめる"
  side-pick:
    title: "<white>取引種別"
    body: "<gray>このアイテムに対する操作を選択してください。"
    sell: "<yellow>購入する"
    buy: "<aqua>納品する"
  not-tradable: "<red>このスロットは現在取引できません。"
  notify-sell: "<aqua>あなたのショップ <shop_name> で <item> が <amount> 個売れました (+<price>)"
  notify-buy: "<aqua>あなたのショップ <shop_name> が <item> を <amount> 個買い取りました (-<price>)"
  notify-summary: "<aqua>不在中にあなたのショップで <count> 件の取引がありました (合計 <price>)。詳細は /vshop history で確認できます。"

error:
  invalid-amount: "<red>数量の入力が不正です。"
  invalid-price: "<red>価格の入力が不正です。"
  blacklisted-item: "<red>このアイテムは取引できません。"
  generic: "<red>エラーが発生しました: <reason>"

edit:
  slot:
    create-title: "<white>出品枠の作成"
    edit-title: "<white>出品枠の編集"
    body: "<gray>対象アイテム: <item>"
    submit: "保存"
    side: "種別"
    unit-price: "販売単価"
    unit-amount: "1パックあたりの個数"
    buy-unit-price: "買取単価 (BUYのみ)"
    buy-capacity: "買取受入残 (アイテム数)"
    trade-limit: "取引上限 (空欄=無制限)"
    limit-scope: "上限のスコープ"
    reset-seconds: "上限リセット秒数 (空欄=なし)"
    created: "<green>出品枠を作成しました。"
    updated: "<green>出品枠を更新しました。"
    place-prompt: "<gray>カーソルにアイテムを持って空きスロットをクリックすると新規出品枠を作成できます。"
  delete:
    title: "<white>出品枠の削除"
    body: "<gray><item> の出品枠を削除します。よろしいですか？"
    yes: "削除する"
    no: "キャンセル"
    done: "<green>出品枠を削除しました。"
  restock:
    coming-soon: "<gray>在庫補充UIは未実装です。"

system:
  prefix: "<dark_gray>[<aqua>VShop<dark_gray>] <reset>"
