# MiniMessage messages (English)
command:
  help:
    header: "<gold>=== ModernVillagerShop Help ==="
  no-permission: "<red>You don't have permission."
  player-only: "<red>This command can only be used by a player."
  shop-not-found: "<red>Shop not found: <shop_id>"
  egg:
    issued: "<green>Gave a spawn egg to <player>."
    not-found: "<red>Player not found: <player>"
  reload:
    done: "<green>Configuration reloaded."
  migrate:
    started: "<yellow>Migration started: <from> -> <to>"
    done: "<green>Migration completed."
    failed: "<red>Migration failed: <reason>"
  history:
    header: "<gold>=== Trade history (p.<page>/<pages>, <total> rows)<filters> ==="
    empty: "<gray>No history yet."
    next-hint: "<gray>Next page: <yellow>/vshop history <args>"
    bad-flag: "<red>Argument error: <reason>"
    player-not-found: "<red>Player not found: <player>"
  search:
    header: "<gold>=== Search: <query> (<page>/<pages>, <total> hits) ==="
    empty: "<gray>No matches."
    next-hint: "<gray>Next page: <yellow>/vshop search <query> <page>"

shop:
  deleted: "<green>Shop <shop_id> deleted."
  suspended: "<yellow>Shop <shop_id> suspended."
  resumed: "<green>Shop <shop_id> resumed."
  egg:
    name: "<aqua>Shop Spawn Egg <gray>(<type>)"
    lore-lines: "<gray>Rows: <lines>"
    lore-admin: "<gray>For admin shops"
  place:
    too-close: "<red>Cannot place shop too close to existing one."
    too-many: "<red>You have reached your shop count limit."
    placed: "<green>Shop placed."
  open:
    suspended: "<yellow>This shop is suspended."
    too-far: "<red>Get closer to this shop."
  edit:
    no-permission: "<red>You do not have permission to edit this shop."
    editing: "<yellow>Editing: <shop_name>"
    busy: "<red>This shop is being edited. Try again shortly."

trade:
  sold: "<green>Bought: <item> x<amount> = <price> <gray>(fee <fee>)"
  bought: "<green>Delivered: <item> x<amount> = <price> <gray>(fee <fee>)"
  out-of-stock: "<red>Out of stock."
  not-enough-items: "<red>You don't have enough items to deliver. (need: <required>, have: <held>)"
  buy-full: "<red>Buy slot is full."
  not-enough-money-buyer: "<red>You don't have enough money."
  not-enough-money-owner: "<red>The shop owner does not have enough funds."
  limit-reached: "<red>Trade limit reached."
  price-drift: "<red>Price changed; transaction canceled. Please reopen."
  frozen-at: "<dark_gray>(price frozen at <time>)</dark_gray>"
  amount-prompt:
    title: "<white>Enter amount"
    body: "<gray>How many packs of <item> would you like to trade?"
    submit: "Next"
    label: "Packs (1 pack = <unit>)"
  confirm-sell:
    title: "<white>Confirm purchase"
    body: "<gray><item> x <amount> (<packs> packs)\nUnit <unit_price> / Total <price>\nFee <fee>"
    yes: "Buy"
    no: "Cancel"
  confirm-buy:
    title: "<white>Confirm delivery"
    body: "<gray>Deliver <item> x <amount> (<packs> packs)\nBuy unit <unit_price> / Payout <payout>\nFee <fee>"
    yes: "Deliver"
    no: "Cancel"
  side-pick:
    title: "<white>Choose action"
    body: "<gray>Pick how you want to trade this item."
    sell: "<yellow>Buy from shop"
    buy: "<aqua>Sell to shop"
  not-tradable: "<red>This slot is not currently tradable."
  notify-sell: "<aqua>Your shop <shop_name> sold <item> x <amount> (+<price>)"
  notify-buy: "<aqua>Your shop <shop_name> bought <item> x <amount> (-<price>)"
  notify-summary: "<aqua>While you were away, your shops had <count> trades (total <price>). See /vshop history for details."

error:
  invalid-amount: "<red>Invalid amount."
  amount-too-large: "<red>Trades are limited to <max> items at a time (requested: <requested>)."
  unit-amount-too-large: "<red>Items per pack must be at most <max>."
  invalid-price: "<red>Invalid price."
  blacklisted-item: "<red>This item is not tradable."
  generic: "<red>An error occurred: <reason>"

coowner:
  no-permission: "<red>You do not have permission to manage co-owners."
  admin-shop: "<red>Admin shops have no co-owners."
  primary-immutable: "<gray>PRIMARY cannot be edited directly — use transfer."
  list:
    title: "<white>Co-owners: <shop_name>"
    body: "<gray>Pick a member to edit, or add a new one."
    add: "<green>Add"
  add:
    title: "<white>Add co-owner"
    body-for: "<gray>Adding <player>. Choose role and share."
    submit: "Add"
    role-label: "Role"
    share-label: "Share (0-100)"
    invalid-name: "<red>Invalid player name."
    done: "<green>Co-owner updated."
  member:
    title: "<white>Co-owner actions"
    body: "<gray><player> [<role> <share>%]"
    edit: "<yellow>Change role / share"
    remove: "<red>Remove"
  edit:
    title: "<white>Edit co-owner"
    body: "<gray>Set the new role and share."
    submit: "Save"
  remove:
    title: "<white>Remove co-owner"
    body: "<gray>Remove <player> from co-owners?"
    yes: "Remove"
    no: "Cancel"
    done: "<green>Co-owner removed."
  transfer:
    title: "<white>Transfer PRIMARY"
    body: "<gray>Transfer PRIMARY to <player>?\nYou will be demoted to MANAGER."
    yes: "Transfer"
    no: "Cancel"
    same-player: "<red>You can't transfer to yourself."
    done: "<green>PRIMARY transferred to <player>."

edit:
  slot:
    hub:
      create-title: "<white>Create slot"
      edit-title: "<white>Edit slot"
      body: "<gray>Item: <item>\nSide: <side>"
      cycle-side: "<yellow>Side: <side> (tap to cycle)"
      sell-button: "<green>Sell settings"
      buy-button: "<aqua>Buy settings"
      save: "<white>Save changes"
      cancel: "<gray>Discard & close"
      delete: "<red>Delete this slot"
    sell-title: "<white>Sell settings"
    buy-title: "<white>Buy settings"
    body: "<gray>Item: <item> (max per pack: <unit_max>)"
    submit: "Apply"
    side-sell: "Sell (SELL)"
    side-buy: "Buy (BUY)"
    side-both: "Both (BOTH)"
    unit-price: "Sell unit price"
    unit-amount: "Items per pack (max <max>)"
    buy-unit-price: "Buy unit price"
    buy-capacity: "Buy capacity (-1 = unlimited, items)"
    trade-limit: "Trade limit (blank = none)"
    limit-scope: "Limit scope"
    reset-seconds: "Limit reset (seconds; blank = none)"
    created: "<green>Slot created."
    updated: "<green>Slot updated."
    place-prompt: "<gray>Click an empty slot while holding an item to create a new slot."
  delete:
    title: "<white>Delete slot"
    body: "<gray>Delete the slot for <item>?"
    yes: "Delete"
    no: "Cancel"
    done: "<green>Slot deleted."
  restock:
    title: "<white>Inventory: <shop_name>"
    admin-shop: "<gray>Admin shops have no physical stock."
    saved: "<green>Inventory saved."
    returned: "<yellow>Returned forbidden items to you."
    prev: "<white>Previous page"
    next: "<white>Next page"
    close: "<red>Close"

action:
  title: "<white>Shop: <shop_name>"
  body: "<gray>Type: <type> / Suspended: <suspended>\nChoose an action."
  edit-slots: "<yellow>Edit items"
  preview: "<aqua>Preview"
  restock: "<green>Edit inventory"
  info-menu: "<gray>Shop info ..."
  settings-menu: "<white>Shop settings ..."
  owner-menu: "<light_purple>Ownership ..."
  coowner: "<light_purple>Co-owners"
  transfer: "<gold>Transfer PRIMARY"
  notifications: "<white>Trade notifications [now: <current>]"
  notifications-on: "<green>Trade notifications enabled."
  notifications-off: "<yellow>Trade notifications disabled."
  state-on: "ON"
  state-off: "OFF"
  history: "<gray>History"
  stats: "<gray>Stats"
  suspend: "<red>Suspend"
  resume: "<green>Resume"
  info:
    title: "<white>Shop info: <shop_name>"
    body: "<gray>Pick what to view."
  settings:
    title: "<white>Shop settings: <shop_name>"
    body: "<gray>Pick a setting to change."
  owner:
    title: "<white>Ownership: <shop_name>"
    body: "<gray>Pick an ownership action."
  rename:
    button: "<white>Rename [now: <current>]"
    title: "<white>Rename shop"
    body: "<gray>Current name: <current>\nEnter a new name."
    label: "Shop name"
    submit: "Save"
    invalid: "<red>Shop name cannot be empty."
    done: "<green>Renamed to <name>."
  profession:
    button: "<white>Change profession [now: <current>]"
    title: "<white>Change profession"
    body: "<gray>Current: <current>\nPick a new profession."
    label: "Profession"
    submit: "Save"
    done: "<green>Profession changed to <profession>."
  delete:
    button: "<dark_red>Delete shop"
    title: "<dark_red>Delete shop"
    body: "<red>Delete <shop_name>?\nThis cannot be undone."
    yes: "Delete"
    no: "Cancel"

history:
  empty: "<gray>No trade history yet."
  header: "<aqua>=== Recent trades (max 10) ==="

stats:
  header: "<aqua>=== <shop_name> stats ==="
  slots: "<gray>Slots: <count>"
  totals: "<gray>SELL: <sell_count> (<sell_total>) / BUY: <buy_count> (<buy_total>)"

player-picker:
  title: "<white>Pick a player"
  head-lore: "<gray>Click to choose"
  last-seen: "<gray>Last seen: <last_seen>"
  prev: "<white>Previous"
  next: "<white>Next"
  cancel: "<red>Cancel"
  search: "<yellow>Search"
  search-active: "<gold>Search (active)"
  sort-name: "<white>Sort: name asc"
  sort-recent: "<white>Sort: recent login"
  search-title: "<white>Search players"
  search-body: "<gray>Filter by prefix. Leave blank to clear."
  search-submit: "Apply"
  search-label: "Query"

# Generic Dialog buttons / hints reused across MultiButton/Confirm/Input flows.
# Spec §9.3 calls out `dialog.*` as a top-level message namespace.
dialog:
  ok: "OK"
  cancel: "Cancel"
  yes: "Yes"
  no: "No"
  back: "Back"
  next: "Next"
  save: "Save"
  invalid-number: "<red>Please enter a number."
  required: "<red>Required."

# Co-owner listing line — uses <primary>/<role>/<share> placeholders.
shop-info:
  coowner-line: "<gray>- <player> <yellow>[<role>]</yellow> <gray><share>%</gray>"
  primary-line: "<gold>PRIMARY:</gold> <primary>"
  # Shop location line — uses <world>/<x>/<y>/<z>.
  location: "<gray>Location: <world> (<x>, <y>, <z>)"

